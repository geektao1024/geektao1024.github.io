<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starter Tool | GeekTao 工作室</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="container">
        <nav class="topbar">
          <a class="brand" href="../../">GeekTao 工作室</a>
          <div class="nav-links">
            <a href="../../">首页</a>
            <a href="https://github.com/geektao1024/geektao.github.io" target="_blank" rel="noreferrer">
              GitHub
            </a>
          </div>
        </nav>

        <p class="micro">Starter Tool</p>
        <h1>这是一个示例工具页。</h1>
        <p class="slogan">
          后续你可以把任意静态工具放进 <code>tools/你的工具名/</code>
          目录，然后在首页增加一个入口链接。
        </p>
      </section>

      <section class="container section">
        <div class="section-title">How To Use</div>
        <div class="philosophy-grid">
          <article class="mini-card">
            <h2>复制目录</h2>
            <p>直接复制 <code>tools/starter/</code>，改成你的新目录名。</p>
          </article>
          <article class="mini-card">
            <h2>替换内容</h2>
            <p>把这里的标题、正文、脚本和资源换成你的真实工具页面。</p>
          </article>
          <article class="mini-card">
            <h2>补入口</h2>
            <p>回到首页，把工具链接挂进站点或工具区，推送后即可访问。</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
